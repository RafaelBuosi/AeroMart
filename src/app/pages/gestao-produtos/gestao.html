<div class="main-content-wrapper fade-in">
  <div class="container-fluid py-4">
    
    <div class="d-flex align-items-center gap-2 mb-4">
      <div class="icon-wrapper-orange">
        <i class="bi bi-box-seam-fill"></i>
      </div>
      <h2 class="section-title mb-0 h4 fw-bold text-uppercase">
        GESTÃO DE <span class="text-orange-dor">ESTOQUE</span>
      </h2>
    </div>

    <div class="row g-4 justify-content-center">
      
      <div class="col-12 col-xl-4">
        <app-produto-form 
          [produtoParaEditar]="produtoSelecionado" 
          (salvoComSucesso)="carregarDados()">
        </app-produto-form>
      </div>

      <div class="col-12 col-xl-8">
        <app-produto-tabela 
          [produtos]="listaProdutos"
          (editarEvento)="prepararEdicao($event)"
          (excluirEvento)="abrirConfirmacao($event)">
        </app-produto-tabela>
      </div>

    </div>
  </div>

  <div class="aero-modal-overlay" *ngIf="exibirModalExclusao">
    <div class="dorfic-glass-card aero-modal-content">
      <div class="card-header-aero bg-danger-dor">
        <i class="bi bi-exclamation-triangle-fill"></i>
        <span class="text-uppercase fw-bold text-white">Confirmar Exclusão</span>
      </div>
      
      <div class="p-4 text-center">
        <p class="aero-description mb-4">
          Tem certeza que deseja remover este item do estoque? 
          <br><small class="opacity-75">Esta operação não poderá ser desfeita.</small>
        </p>
        
        <div class="d-flex gap-3">
          <button class="btn-aero-blue opacity-75 grow" (click)="fecharModal()">
            <i class="bi bi-x-circle"></i> CANCELAR
          </button>
          <button class="btn-aero-danger grow" (click)="confirmarRemocao()">
            <i class="bi bi-trash3-fill"></i> EXCLUIR AGORA
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
